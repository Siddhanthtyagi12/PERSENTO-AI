services:
  - type: web
    name: presento-ai
    runtime: python
    buildCommand: "pip install -r requirements_cloud.txt"
    startCommand: "gunicorn backend.cloud_server:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: USE_CLOUD
        value: "true"
      - key: DB_CONNECTION_STRING
        sync: false # Set this in Render Dashboard for security
      - key: PYTHON_VERSION
        value: "3.11.0"
