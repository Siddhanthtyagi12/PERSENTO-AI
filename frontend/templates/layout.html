<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Presento | School Management{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#F8FAFC',
                            100: '#E2E8F0',
                            500: '#3B82F6',
                            600: '#2563EB',
                            700: '#1D4ED8',
                            900: '#1E3A8A',
                        },
                        accent: {
                            default: '#06B6D4',
                            hover: '#22D3EE'
                        },
                        sidebar: '#18181B', // Zinc-900
                        zinc: {
                            950: '#09090B',
                            900: '#18181B', 
                            800: '#27272A', // Main Background
                            700: '#3F3F46', // Card Background
                            600: '#52525B', 
                            500: '#71717A'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(63, 63, 70, 0.4); /* Zinc-700 based */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }
        .sidebar-link {
            transition: all 0.2s ease;
            color: #A1A1AA; /* Zinc-400 for better contrast on Zinc-900 */
        }
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }
        .sidebar-link.active {
            background: #2563EB;
            color: white;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
        }
        .active-accent {
            color: #06B6D4;
        }
        
        /* New Premium Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulseGlow { 
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }

        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-slide-up { opacity: 0; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-in-right { animation: slideInRight 0.5s ease-out forwards; }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
        .stagger-4 { animation-delay: 0.4s; }

        .stagger-4 { animation-delay: 0.4s; }

        /* PURE FLEXBOX LAYOUT (NO FIXED POSITIONS) */
        .sidebar {
            width: 256px;
            height: 100vh !important;
            display: flex;
            flex-direction: column;
            background: #18181B;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden !important;
            flex-shrink: 0;
        }
        .sidebar-links {
            flex-grow: 1;
            overflow-y: auto !important;
            min-height: 0 !important;
            padding-bottom: 60px;
        }
        .sidebar-links::-webkit-scrollbar {
            width: 6px;
            display: block !important;
        }
        .sidebar-links::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2) !important;
            border-radius: 10px;
        }
        .main-content {
            flex-grow: 1;
            overflow-y: auto !important;
            height: 100vh;
            background: #27272A;
        }
    </style>
</head>
<body class="bg-zinc-800 text-white font-sans selection:bg-brand-500 selection:text-white">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- Logo -->
            <div class="p-6 flex items-center gap-3 border-b border-white/5 shrink-0">
                <a href="/" class="flex items-center gap-3 group">
                    <div class="bg-brand-600 text-white p-2 rounded-xl shadow-lg shadow-brand-500/20 group-hover:scale-110 transition-transform">
                        <i data-lucide="graduation-cap" class="w-6 h-6"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-white">Presento<span class="text-brand-500">AI</span></span>
                </a>
            </div>

        <nav class="sidebar-links p-4 space-y-2">
                <p class="px-4 text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Main Menu</p>
                <a href="/dashboard" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'dashboard' %}active{% endif %}">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm">Dashboard</span>
                </a>
                <a href="/registration" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'registration' %}active{% endif %}">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm">Face Registration</span>
                </a>
                <a href="/logout" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:text-red-500">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm">Logout</span>
                </a>

                <div class="pt-4 border-t border-white/5 my-4"></div>
                <p class="px-4 text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Monitoring</p>
                
                <a href="/live" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'live' %}active{% endif %}">
                    <div class="relative">
                        <i data-lucide="activity" class="w-5 h-5"></i>
                        <span class="absolute -top-1 -right-1 flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                        </span>
                    </div>
                    <span class="font-semibold text-sm">Live Monitor</span>
                </a>
                <a href="/critical" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'critical' %}active{% endif %}">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm">Critical List</span>
                </a>
                <a href="/reports" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'reports' %}active{% endif %}">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm">Analytics</span>
                </a>
                <a href="/quiz" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'quiz' %}active{% endif %}">
                    <i data-lucide="brain-circuit" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm">Smart Quiz</span>
                </a>

                <div class="pt-4 border-t border-white/5 my-4"></div>
                <p class="px-4 text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Finance & Academics</p>

                <a href="/fees" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'fees' %}active{% endif %}">
                    <i data-lucide="wallet-cards" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm">Fee Management</span>
                </a>
                <a href="/performance" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'performance' %}active{% endif %}">
                    <i data-lucide="line-chart" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm">Academic Performance</span>
                </a>

                <div class="pt-4 border-t border-white/5 my-4"></div>
                <p class="px-4 text-[10px] font-bold uppercase tracking-widest text-zinc-500 mb-2">Management</p>

                <a href="/manage_users" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'manage_users' %}active{% endif %}">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm">Manage Users</span>
                </a>
                <a href="/manage_logs" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'manage_logs' %}active{% endif %}">
                    <i data-lucide="clipboard-list" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm">Manage Logs</span>
                </a>
                <a href="/settings" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'settings' %}active{% endif %}">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span class="font-semibold text-sm">Settings</span>
                </a>
            </nav>

            <!-- Profile / Status -->
            <div class="p-4 bg-white/[0.02] border-t border-white/5 flex items-center gap-3 shrink-0">
                <div class="h-10 w-10 rounded-full bg-brand-600 flex items-center justify-center text-white font-bold shadow-lg shadow-brand-500/20">
                    PR
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-bold text-white truncate">Principal Sir</p>
                    <p class="text-[10px] text-emerald-500 flex items-center gap-1 font-bold">
                        <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        System Live
                    </p>
                </div>
            </div>
        </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
